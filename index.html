<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Deutsch mit Hunar" />
    <meta name="theme-color" content="#7F77DD" />
    <link rel="manifest" href="/learn_german/manifest.json" />
    <title>Deutsch mit Hunar</title>
    <script>
      // Generate favicon + apple touch icon in code — no image files needed
      function makeIcon(size) {
        const c = document.createElement('canvas')
        c.width = size; c.height = size
        const ctx = c.getContext('2d')
        const r = size * 0.2
        ctx.beginPath()
        ctx.moveTo(r,0); ctx.lineTo(size-r,0)
        ctx.quadraticCurveTo(size,0,size,r)
        ctx.lineTo(size,size-r)
        ctx.quadraticCurveTo(size,size,size-r,size)
        ctx.lineTo(r,size)
        ctx.quadraticCurveTo(0,size,0,size-r)
        ctx.lineTo(0,r)
        ctx.quadraticCurveTo(0,0,r,0)
        ctx.closePath()
        ctx.fillStyle = '#7F77DD'
        ctx.fill()
        ctx.fillStyle = '#ffffff'
        ctx.font = `bold ${size*0.38}px system-ui`
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText('DH', size/2, size/2)
        return c.toDataURL('image/png')
      }
      window.addEventListener('DOMContentLoaded', () => {
        const favicon = document.createElement('link')
        favicon.rel = 'icon'
        favicon.href = makeIcon(32)
        document.head.appendChild(favicon)
        const apple = document.createElement('link')
        apple.rel = 'apple-touch-icon'
        apple.href = makeIcon(192)
        document.head.appendChild(apple)
      })
    </script>
    <script type="module" crossorigin src="/learn_german/assets/index-dZmXgBHu.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
